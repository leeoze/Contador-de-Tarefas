# ============================================================
# PIPELINE ÚNICO — CI + CD (Next.js + GitHub Pages)
# ============================================================

name: CI/CD — Contador de Tarefas

# ------------------------------------------------------------
# GATILHOS
# - push na main → roda CI + CD (deploy)
# - pull_request → roda apenas CI
# ------------------------------------------------------------
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# ------------------------------------------------------------
# VARIÁVEIS DE AMBIENTE
# ------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ------------------------------------------------------------
# PERMISSÕES
# Necessárias para deploy no GitHub Pages
# ------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

# ------------------------------------------------------------
# CONCORRÊNCIA
# Evita múltiplos deploys simultâneos
# ------------------------------------------------------------
concurrency:
  group: "pages"
  cancel-in-progress: false

# ============================================================
# JOB ÚNICO (PIPELINE LINEAR)
# ============================================================
jobs:
  pipeline:
    name: CI + Build + Deploy
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------
      - name: Checkout do código
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # DETECTAR GERENCIADOR (npm ou yarn)
      # ------------------------------------------------------
      - name: Detectar package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
          else
            echo "Nenhum package manager encontrado"
            exit 1
          fi

      # ------------------------------------------------------
      # NODE.JS
      # ------------------------------------------------------
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      # ------------------------------------------------------
      # CACHE DO NEXT.JS
      # ------------------------------------------------------
      - name: Restaurar cache do Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      # ------------------------------------------------------
      # INSTALAÇÃO
      # ------------------------------------------------------
      - name: Instalar dependências
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      # ------------------------------------------------------
      # CI — QUALIDADE DE CÓDIGO
      # ------------------------------------------------------

      - name: Rodar lint
        run: npm run lint

      - name: Rodar testes
        run: npm test
        env:
          CI: true

      # ------------------------------------------------------
      # BUILD
      # ------------------------------------------------------
      - name: Configurar GitHub Pages (Next.js)
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Build da aplicação
        run: ${{ steps.detect-package-manager.outputs.runner }} next build

      # ------------------------------------------------------
      # UPLOAD DO ARTEFATO (SÓ NO PUSH)
      # ------------------------------------------------------
      - name: Upload do artefato
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      # ------------------------------------------------------
      # DEPLOY (CD)
      # Só executa em push na branch main
      # ------------------------------------------------------
      - name: Deploy para GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4